# ICT Liquidity Sweep Strategy Configuration
# Single source of truth. Base config + per-symbol overrides.

timeframe: "5m"

# Liquidity / Sweep
swing_lookback: 20
swing_strength: 3
min_sweep_ticks: 2
max_sweep_ticks: 70
sweep_check_bars: 3

# Displacement
displacement_multiplier: 1.35
avg_body_lookback: 20
high_displacement_override: 3.0

# FVG
min_fvg_ticks: 5
min_fvg_ticks_mtf: 3          # Min FVG size on 3m (smaller gaps valid on lower TF)
max_fvg_age_bars: 50
max_fvg_wait_bars: 15
use_mtf_fvg: true             # Also search 3m bars for FVGs
mtf_timeframe: "3m"

# Mitigation
mitigation_retry_bars: 3      # Bars to retry after first FVG touch before consuming

# Stop / Risk
stop_buffer_ticks: 2
min_risk_ticks: 5
max_risk_ticks: 40

# Targets
t1_r: 3
trail_r: 6
t2_buffer_ticks: 4
runner_buffer_ticks: 6

# Session
session_start: "08:00"
session_end: "16:00"
allow_lunch: false

# Risk management
max_daily_trades: 5
max_daily_losses: 3
loss_cooldown_minutes: 0

# Position sizing
contracts: 3
contracts_subsequent: 2

# Hybrid filters
filters:
  use_hybrid: true
  use_di_filter: true
  min_adx: 11
  ema_fast: 20
  ema_slow: 50

# Per-symbol overrides
symbols:
  ES:
    tick_size: 0.25
    tick_value: 12.50
    min_fvg_ticks: 3
    min_risk_ticks: 5
    max_risk_ticks: 40
  NQ:
    tick_size: 0.25
    tick_value: 5.00
    min_fvg_ticks: 8
    min_risk_ticks: 24
    max_risk_ticks: 160
    max_sweep_ticks: 300
    high_displacement_override: 0
    trail_r: 4
  MES:
    tick_size: 0.25
    tick_value: 1.25
    min_fvg_ticks: 3
    min_risk_ticks: 5
    max_risk_ticks: 40
  MNQ:
    tick_size: 0.25
    tick_value: 0.50
    min_fvg_ticks: 8
    min_risk_ticks: 24
    max_risk_ticks: 160
    max_sweep_ticks: 300
    high_displacement_override: 0
    trail_r: 4
  SPY:
    tick_size: 0.01
    tick_value: 0.01
    min_fvg_ticks: 20
    min_risk_ticks: 30
    max_risk_ticks: 500
  QQQ:
    tick_size: 0.01
    tick_value: 0.01
    min_fvg_ticks: 40
    min_risk_ticks: 50
    max_risk_ticks: 500
