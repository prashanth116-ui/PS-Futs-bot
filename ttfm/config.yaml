# TTrades Fractal Model Configuration
name: "TTFM_Strategy"
version: "2.0.0"
description: "TTrades Fractal Model - C3 + CISD + Daily Bias (no MTF alignment)"

# Timeframe settings
htf_timeframe: "1d"       # Daily bias (continuation/reversal)
ltf_timeframe: "15m"      # 15m for swing detection, candle labeling, CISD, entry

# Swing detection
swing_left_bars: 2
swing_right_bars: 2

# CISD
cisd_lookback_bars: 10

# Entry filter: C3 + CISD + Daily Bias match (MTF alignment dropped in v2)
entry_on: "C3"            # "C3" or "C4"
require_cisd: true
require_mtf_alignment: false  # Dropped: was over-filtering (18 -> 42 trades)

# Exit (R-target based) - 1R/3R optimal per 61-day backtest
t1_r_target: 1            # T1 fixed exit at 1R (was 2R)
trail_r_trigger: 3        # Trail activates at 3R (was 4R)
trail_floor_r: 1          # Trail floor at 1R (T1 level)
stop_buffer_ticks: 2

# Position sizing
first_trade_contracts: 3
subsequent_contracts: 2
max_open_trades: 3

# Session timing
session_start: "04:00"
session_end: "16:00"
no_entry_start: "12:00"
no_entry_end: "14:00"

# Instrument defaults
symbols:
  ES:
    tick_size: 0.25
    tick_value: 12.50
    min_risk_pts: 1.5
    max_risk_pts: 7.0      # Capped from 10.0 (trades >8pts had 0% WR)
  NQ:
    tick_size: 0.25
    tick_value: 5.00
    min_risk_pts: 6.0
    max_risk_pts: 20.0     # Capped from 25.0
  MES:
    tick_size: 0.25
    tick_value: 1.25
    min_risk_pts: 1.5
    max_risk_pts: 7.0      # Matches ES
  MNQ:
    tick_size: 0.25
    tick_value: 0.50
    min_risk_pts: 6.0
    max_risk_pts: 20.0     # Matches NQ
